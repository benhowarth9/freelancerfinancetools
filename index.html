<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freelancer Finance Tools — Free Calculators for Independent Workers</title>
  <meta name="description" content="Free freelance tax calculator, hourly rate calculator, quarterly tax estimator and project quote builder. Updated for 2025 tax year."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .input-label{display:block;font-size:.7rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
    .input-prefix{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#7C3AED;font-weight:700;font-size:1rem;pointer-events:none}
    .input{width:100%;padding:.75rem 1rem;border:2px solid #E5E7EB;border-radius:.75rem;font-size:.95rem;font-weight:600;background:white;transition:border-color .15s;outline:none}
    .input:focus{border-color:#7C3AED}
    .result-card{background:linear-gradient(135deg,#2D1B69,#6D28D9);border-radius:1rem;padding:1.5rem;color:white}
    .result-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.65);margin-bottom:.2rem}
    .result-value{font-size:2rem;font-weight:900}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer } = Recharts;

const C = { chart: ["#7C3AED","#A78BFA","#DDD6FE","#EDE9FE"] };
const STD_DEDUCTION = { single: 15000, mfj: 30000 };
const BRACKETS = {
  single: [[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]],
  mfj:    [[23850,.10],[96950,.12],[206700,.22],[394600,.24],[501050,.32],[751600,.35],[Infinity,.37]],
};

function calcFedTax(taxable, filing) {
  let tax = 0, prev = 0;
  for (const [limit, rate] of BRACKETS[filing]) {
    if (taxable <= prev) break;
    tax += Math.min(taxable - prev, limit - prev) * rate;
    prev = limit;
  }
  return tax;
}

const fmt = (n) => isNaN(n)||n==null ? "$0" : "$"+Math.max(0,Math.round(n)).toLocaleString("en-US");
const pct = (n) => isNaN(n) ? "0%" : Math.max(0,n).toFixed(1)+"%";

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button onClick={() => { navigator.clipboard?.writeText(text).catch(()=>{}); setCopied(true); setTimeout(()=>setCopied(false),2000); }}
      className="text-xs font-semibold text-violet-600 border border-violet-200 rounded-lg px-3 py-1.5 hover:bg-violet-50 transition-colors">
      {copied ? "✓ Copied!" : "Copy Results"}
    </button>
  );
}

function AffiliateCTA({ tool, url, desc }) {
  return (
    <a href={url} target="_blank" rel="noopener noreferrer"
      className="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-xl p-4 hover:border-violet-300 hover:bg-violet-50 transition-all">
      <div>
        <div className="font-bold text-gray-800 text-sm">{tool}</div>
        <div className="text-gray-500 text-xs">{desc}</div>
      </div>
      <span className="text-violet-600 font-bold text-sm ml-3">Try free →</span>
    </a>
  );
}

function TaxCalc() {
  const [income, setIncome] = useState(80000);
  const [filing, setFiling] = useState("single");
  const [stateRate, setStateRate] = useState(5);
  const [invoiceAmt, setInvoiceAmt] = useState(5000);

  const selfEmpTax = income * 0.9235 * 0.153;
  const seDed = selfEmpTax / 2;
  const afterSEDed = Math.max(0, income - seDed - STD_DEDUCTION[filing]);
  const fedTax = calcFedTax(afterSEDed, filing);
  const stateTax = income * (stateRate / 100);
  const totalTax = selfEmpTax + fedTax + stateTax;
  const takeHome = Math.max(0, income - totalTax);
  const effRate = income > 0 ? (totalTax / income) * 100 : 0;
  const setAsideRate = income > 0 ? totalTax / income : 0;
  const setAsidePerInvoice = invoiceAmt * setAsideRate;
  const keepPerInvoice = invoiceAmt - setAsidePerInvoice;
  const chartData = [
    { name: "Self-Employment Tax", value: Math.round(selfEmpTax) },
    { name: "Federal Income Tax", value: Math.round(fedTax) },
    { name: "State Income Tax", value: Math.round(stateTax) },
    { name: "Take-Home", value: Math.round(takeHome) },
  ];
  const copyText = `Freelance Tax Estimate (2025)\nGross: ${fmt(income)}\nSelf-Employment Tax: ${fmt(selfEmpTax)}\nFederal Tax: ${fmt(fedTax)}\nState Tax: ${fmt(stateTax)}\nTotal Taxes: ${fmt(totalTax)}\nTake-Home: ${fmt(takeHome)}\nEffective Rate: ${pct(effRate)}`;

  return (
    <div className="space-y-6">
      <div className="space-y-4">
        <div>
          <label className="input-label">Annual Freelance Income</label>
          <div className="relative"><span className="input-prefix">$</span>
            <input type="number" value={income} onChange={e=>setIncome(+e.target.value)} className="input pl-9"/>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="input-label">Filing Status</label>
            <select value={filing} onChange={e=>setFiling(e.target.value)} className="input px-4">
              <option value="single">Single</option>
              <option value="mfj">Married Filing Jointly</option>
            </select>
          </div>
          <div>
            <label className="input-label">State Tax Rate %</label>
            <input type="number" value={stateRate} onChange={e=>setStateRate(+e.target.value)} min={0} max={15} step={0.1} className="input px-4"/>
          </div>
        </div>
      </div>
      <div className="result-card">
        <div className="grid grid-cols-2 gap-4 mb-5">
          <div><div className="result-label">Take-Home Pay</div><div className="result-value">{fmt(takeHome)}</div></div>
          <div><div className="result-label">Effective Tax Rate</div><div className="result-value">{pct(effRate)}</div></div>
        </div>
        <div className="space-y-2 text-sm border-t border-white/20 pt-4">
          {[["Self-Employment Tax (15.3%)",selfEmpTax],["Federal Income Tax",fedTax],["State Income Tax",stateTax]].map(([label,val])=>(
            <div key={label} className="flex justify-between"><span className="text-white/70">{label}</span><span className="font-bold">{fmt(val)}</span></div>
          ))}
          <div className="flex justify-between border-t border-white/20 pt-2">
            <span className="text-white/80 font-semibold">Total Tax Burden</span>
            <span className="font-black text-orange-300">{fmt(totalTax)}</span>
          </div>
        </div>
        <div className="mt-4 flex justify-end"><CopyBtn text={copyText}/></div>
      </div>
      <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-5">
        <p className="text-amber-900 font-black text-sm mb-3">💡 SET ASIDE PER INVOICE</p>
        <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-amber-600 font-bold">$</span>
          <input type="number" value={invoiceAmt} onChange={e=>setInvoiceAmt(+e.target.value)} className="w-full pl-9 pr-4 py-3 border-2 border-amber-200 rounded-xl font-semibold focus:border-amber-400 focus:outline-none bg-white"/>
        </div>
        <div className="grid grid-cols-2 gap-3 mt-3">
          <div className="bg-red-100 rounded-xl p-3 text-center">
            <div className="text-red-600 text-xs font-bold uppercase mb-1">Move to Tax Savings</div>
            <div className="text-red-700 text-xl font-black">{fmt(setAsidePerInvoice)}</div>
          </div>
          <div className="bg-green-100 rounded-xl p-3 text-center">
            <div className="text-green-600 text-xs font-bold uppercase mb-1">Yours to Keep</div>
            <div className="text-green-700 text-xl font-black">{fmt(keepPerInvoice)}</div>
          </div>
        </div>
      </div>
      <div>
        <p className="input-label mb-3">Income Breakdown</p>
        <div style={{height:"176px"}}>
          <ResponsiveContainer width="100%" height="100%">
            <PieChart><Pie data={chartData} cx="50%" cy="50%" innerRadius={50} outerRadius={75} dataKey="value" paddingAngle={3}>
              {chartData.map((_,i)=><Cell key={i} fill={C.chart[i]}/>)}
            </Pie><Tooltip formatter={v=>fmt(v)}/></PieChart>
          </ResponsiveContainer>
        </div>
        <div className="flex flex-wrap gap-2 justify-center">
          {chartData.map((d,i)=>(
            <div key={i} className="flex items-center gap-1 text-xs text-gray-500">
              <div className="w-2 h-2 rounded-full" style={{background:C.chart[i]}}/>{d.name}
            </div>
          ))}
        </div>
      </div>
      <div className="space-y-2 pt-2">
        <p className="input-label mb-2">Recommended Tools</p>
        <AffiliateCTA tool="TurboTax Self-Employed" url="https://turbotax.intuit.com" desc="Auto-imports freelance income, finds deductions"/>
        <AffiliateCTA tool="QuickBooks Self-Employed" url="https://quickbooks.intuit.com" desc="Track income, expenses & quarterly taxes"/>
      </div>
    </div>
  );
}

function RateCalc() {
  const [salary, setSalary] = useState(100000);
  const [expenses, setExpenses] = useState(8000);
  const [hoursPerWeek, setHoursPerWeek] = useState(40);
  const [billablePct, setBillablePct] = useState(75);
  const [vacWeeks, setVacWeeks] = useState(4);
  const [buffer, setBuffer] = useState(20);

  const workWeeks = 52 - vacWeeks;
  const billableHours = workWeeks * hoursPerWeek * (billablePct / 100);
  const totalNeeded = (salary + expenses) * (1 + buffer / 100);
  const hourlyRate = billableHours > 0 ? totalNeeded / billableHours : 0;
  const dailyRate = hourlyRate * 8;
  const copyText = `Freelance Rate\nTarget Income: ${fmt(salary)}\nExpenses: ${fmt(expenses)}\nBillable Hours/Year: ${Math.round(billableHours)}\nMinimum Hourly Rate: ${fmt(hourlyRate)}\nDaily Rate: ${fmt(dailyRate)}`;

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-1 gap-4">
        {[{label:"Desired Annual Take-Home",val:salary,set:setSalary},{label:"Annual Business Expenses",val:expenses,set:setExpenses}].map(({label,val,set})=>(
          <div key={label}><label className="input-label">{label}</label>
            <div className="relative"><span className="input-prefix">$</span>
              <input type="number" value={val} onChange={e=>set(+e.target.value)} className="input pl-9"/>
            </div>
          </div>
        ))}
        <div className="grid grid-cols-2 gap-3">
          {[{label:"Hours/Week",val:hoursPerWeek,set:setHoursPerWeek},{label:"Vacation Weeks",val:vacWeeks,set:setVacWeeks},{label:"Billable % of Time",val:billablePct,set:setBillablePct},{label:"Buffer %",val:buffer,set:setBuffer}].map(({label,val,set})=>(
            <div key={label}><label className="input-label">{label}</label>
              <input type="number" value={val} onChange={e=>set(+e.target.value)} className="input px-4 text-center"/>
            </div>
          ))}
        </div>
      </div>
      <div className="result-card">
        <p className="result-label">Your Minimum Hourly Rate</p>
        <p className="text-5xl font-black mt-1">{fmt(hourlyRate)}<span className="text-xl font-semibold opacity-60">/hr</span></p>
        <div className="grid grid-cols-2 gap-4 mt-5 border-t border-white/20 pt-4 text-sm">
          <div><div className="opacity-60">Daily Rate (8 hrs)</div><div className="font-black text-xl">{fmt(dailyRate)}</div></div>
          <div><div className="opacity-60">Billable hrs/month</div><div className="font-black text-xl">{Math.round(billableHours/12)}</div></div>
        </div>
        <div className="mt-4 flex justify-end"><CopyBtn text={copyText}/></div>
      </div>
      <div className="bg-gray-50 rounded-2xl p-5 space-y-2">
        {[[`Target take-home`,fmt(salary)],[`Business expenses`,fmt(expenses)],[`Buffer (${buffer}%)`,fmt((salary+expenses)*buffer/100)],[`Total to bill/year`,fmt(totalNeeded)],[`Billable hours/year`,`${Math.round(billableHours)} hrs`]].map(([l,v])=>(
          <div key={l} className="flex justify-between text-sm"><span className="text-gray-500">{l}</span><span className="font-bold">{v}</span></div>
        ))}
      </div>
      <div className="space-y-2 pt-2">
        <p className="input-label mb-2">Invoice & Contract Tools</p>
        <AffiliateCTA tool="FreshBooks" url="https://www.freshbooks.com" desc="Invoicing, time tracking & expense reports"/>
        <AffiliateCTA tool="HoneyBook" url="https://www.honeybook.com" desc="Contracts, proposals & client management"/>
      </div>
    </div>
  );
}

function QuarterlyCalc() {
  const [ytdIncome, setYtdIncome] = useState(30000);
  const [ytdExpenses, setYtdExpenses] = useState(3000);
  const [filing, setFiling] = useState("single");
  const [stateRate, setStateRate] = useState(5);
  const [quarter, setQuarter] = useState("Q2");

  const qNum = {Q1:1,Q2:2,Q3:3,Q4:4}[quarter];
  const annNet = Math.max(0, ((ytdIncome-ytdExpenses)/qNum)*4);
  const selfEmp = annNet*0.9235*0.153;
  const taxable = Math.max(0, annNet - selfEmp/2 - STD_DEDUCTION[filing]);
  const fedTax = calcFedTax(taxable, filing);
  const stateTax = annNet*(stateRate/100);
  const totalYear = selfEmp+fedTax+stateTax;
  const quarterly = totalYear/4;
  const dueDate = {Q1:"April 15, 2026",Q2:"June 17, 2026",Q3:"September 16, 2026",Q4:"January 15, 2027"}[quarter];
  const copyText = `Quarterly Tax — ${quarter}\nPay by: ${dueDate}\nAmount Due: ${fmt(quarterly)}\nProjected Annual Tax: ${fmt(totalYear)}`;

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 gap-4">
        <div><label className="input-label">YTD Gross Income</label>
          <div className="relative"><span className="input-prefix">$</span>
            <input type="number" value={ytdIncome} onChange={e=>setYtdIncome(+e.target.value)} className="input pl-9"/>
          </div>
        </div>
        <div><label className="input-label">YTD Business Expenses</label>
          <div className="relative"><span className="input-prefix">$</span>
            <input type="number" value={ytdExpenses} onChange={e=>setYtdExpenses(+e.target.value)} className="input pl-9"/>
          </div>
        </div>
        <div><label className="input-label">Filing Status</label>
          <select value={filing} onChange={e=>setFiling(e.target.value)} className="input px-4">
            <option value="single">Single</option><option value="mfj">Married Filing Jointly</option>
          </select>
        </div>
        <div><label className="input-label">State Tax Rate %</label>
          <input type="number" value={stateRate} onChange={e=>setStateRate(+e.target.value)} min={0} max={15} step={0.1} className="input px-4"/>
        </div>
        <div className="col-span-2">
          <label className="input-label">Which Quarter?</label>
          <div className="grid grid-cols-4 gap-2">
            {["Q1","Q2","Q3","Q4"].map(q=>(
              <button key={q} onClick={()=>setQuarter(q)}
                className={`py-3 rounded-xl font-black text-sm transition-all ${quarter===q?"bg-violet-600 text-white":"bg-gray-100 text-gray-600"}`}>{q}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{background:"linear-gradient(135deg,#EA580C,#DC2626)"}} className="rounded-2xl p-6 text-white">
        <p className="text-orange-100 text-xs font-semibold uppercase tracking-wider mb-1">Pay by {dueDate}</p>
        <p className="text-5xl font-black">{fmt(quarterly)}</p>
        <p className="text-orange-100 text-sm mt-1">estimated quarterly payment</p>
        <div className="mt-4 flex justify-end"><CopyBtn text={copyText}/></div>
      </div>
      <div className="bg-gray-50 rounded-2xl p-5 space-y-2">
        {[["Annualized net income",fmt(annNet)],["Self-employment tax",fmt(selfEmp)],["Federal income tax",fmt(fedTax)],["State income tax",fmt(stateTax)],["Projected annual tax",fmt(totalYear)]].map(([l,v])=>(
          <div key={l} className="flex justify-between text-sm"><span className="text-gray-500">{l}</span><span className="font-bold">{v}</span></div>
        ))}
      </div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
        <strong>Safe Harbor:</strong> Pay 90% of this year's tax or 100% of last year's to avoid IRS penalties.
      </div>
    </div>
  );
}

function QuoteCalc() {
  const [rate, setRate] = useState(125);
  const [hours, setHours] = useState(20);
  const [expenses, setExpenses] = useState(0);
  const [expMarkup, setExpMarkup] = useState(15);
  const [revisions, setRevisions] = useState(2);
  const [revHours, setRevHours] = useState(2);
  const [contingency, setContingency] = useState(10);

  const labor = rate*hours;
  const revCost = revisions*revHours*rate;
  const expWithMarkup = expenses*(1+expMarkup/100);
  const subtotal = labor+revCost+expWithMarkup;
  const contingencyAmt = subtotal*(contingency/100);
  const total = subtotal+contingencyAmt;
  const deposit = total*0.5;
  const effRate = (hours+revisions*revHours)>0 ? total/(hours+revisions*revHours) : 0;
  const copyText = `Project Quote\nCore Labor: ${fmt(labor)}\nRevisions: ${fmt(revCost)}\nExpenses: ${fmt(expWithMarkup)}\nContingency: ${fmt(contingencyAmt)}\nTotal: ${fmt(total)}\n50% Deposit: ${fmt(deposit)}`;

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 gap-4">
        {[{label:"Hourly Rate",val:rate,set:setRate,pre:true},{label:"Est. Project Hours",val:hours,set:setHours},{label:"Hard Costs",val:expenses,set:setExpenses,pre:true},{label:"Expense Markup %",val:expMarkup,set:setExpMarkup},{label:"Revision Rounds",val:revisions,set:setRevisions},{label:"Hours per Revision",val:revHours,set:setRevHours}].map(({label,val,set,pre})=>(
          <div key={label}><label className="input-label">{label}</label>
            <div className="relative">
              {pre && <span className="input-prefix">$</span>}
              <input type="number" value={val} onChange={e=>set(+e.target.value)} className={`input ${pre?"pl-9":"px-4"}`}/>
            </div>
          </div>
        ))}
        <div className="col-span-2"><label className="input-label">Contingency % (scope creep buffer)</label>
          <input type="number" value={contingency} onChange={e=>setContingency(+e.target.value)} className="input px-4 w-full"/>
        </div>
      </div>
      <div className="result-card">
        <div className="grid grid-cols-2 gap-4">
          <div><div className="result-label">Quote Total</div><div className="text-4xl font-black">{fmt(total)}</div></div>
          <div><div className="result-label">50% Deposit</div><div className="text-4xl font-black">{fmt(deposit)}</div></div>
        </div>
        <div className="mt-4 border-t border-white/20 pt-3">
          <div className="opacity-60 text-xs">Effective rate (incl. revisions)</div>
          <div className="font-black text-lg">{fmt(effRate)}/hr</div>
        </div>
        <div className="mt-3 flex justify-end"><CopyBtn text={copyText}/></div>
      </div>
      <div className="bg-gray-50 rounded-2xl p-5 space-y-2">
        {[["Core labor",fmt(labor)],["Revision rounds",fmt(revCost)],["Expenses + markup",fmt(expWithMarkup)],[`Contingency (${contingency}%)`,fmt(contingencyAmt)]].map(([l,v])=>(
          <div key={l} className="flex justify-between text-sm"><span className="text-gray-500">{l}</span><span className="font-bold">{v}</span></div>
        ))}
        <div className="flex justify-between border-t pt-2"><span className="font-black">Total</span><span className="font-black text-violet-700">{fmt(total)}</span></div>
      </div>
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-800">
        <strong>Always get 50% upfront.</strong> It filters out bad clients and protects your time.
      </div>
      <div className="space-y-2 pt-2">
        <p className="input-label mb-2">Contract & Proposal Tools</p>
        <AffiliateCTA tool="Bonsai" url="https://www.hellobonsai.com" desc="Contracts, invoices & project management"/>
        <AffiliateCTA tool="AND.CO" url="https://www.and.co" desc="Free proposals, contracts & invoices"/>
      </div>
    </div>
  );
}

const TABS = [
  {id:"tax",icon:"📊",short:"Tax",label:"Tax Estimator",desc:"See your real take-home after all taxes"},
  {id:"rate",icon:"⏱️",short:"Rate",label:"Hourly Rate",desc:"Calculate the rate you actually need to charge"},
  {id:"quarterly",icon:"📅",short:"Quarterly",label:"Quarterly Tax",desc:"Never miss an IRS payment again"},
  {id:"quote",icon:"💼",short:"Quote",label:"Project Quote",desc:"Build a professional client quote in seconds"},
];

function App() {
  const [active, setActive] = useState("tax");
  const current = TABS.find(t=>t.id===active);
  return (
    <div className="min-h-screen bg-gray-50">
      <div style={{background:"linear-gradient(135deg,#1E1040 0%,#2D1B69 50%,#4C1D95 100%)"}} className="px-5 pt-8 pb-14">
        <div className="max-w-lg mx-auto">
          <div className="flex items-center gap-2 mb-5">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-white text-sm" style={{background:"#F97316"}}>F</div>
            <span className="font-bold text-white text-base tracking-tight">FreelancerFinanceTools.com</span>
            <span className="ml-auto text-xs text-violet-300 font-semibold border border-violet-400 rounded-full px-2.5 py-0.5">Free · No signup</span>
          </div>
          <h1 className="text-3xl font-black text-white leading-tight mb-2">Know exactly<br/><span style={{color:"#FB923C"}}>what you're earning.</span></h1>
          <p className="text-violet-200 text-sm">4 free calculators for independent workers. Updated for 2025 tax year.</p>
        </div>
      </div>
      <div className="max-w-lg mx-auto px-4 -mt-6 mb-2">
        <div className="bg-white rounded-2xl shadow-lg p-1.5 grid grid-cols-4 gap-1">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActive(t.id)}
              className={`rounded-xl py-2.5 px-1 text-center transition-all ${active===t.id?"text-white shadow":"text-gray-400 hover:bg-gray-50"}`}
              style={active===t.id?{background:"#7C3AED"}:{}}>
              <div className="text-lg">{t.icon}</div>
              <div className="text-xs font-bold mt-0.5 leading-tight">{t.short}</div>
            </button>
          ))}
        </div>
      </div>
      <div className="max-w-lg mx-auto px-4 pt-4 pb-12">
        <div className="mb-4">
          <h2 className="text-xl font-black text-gray-900">{current.label}</h2>
          <p className="text-gray-500 text-sm">{current.desc}</p>
        </div>
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
          {active==="tax" && <TaxCalc/>}
          {active==="rate" && <RateCalc/>}
          {active==="quarterly" && <QuarterlyCalc/>}
          {active==="quote" && <QuoteCalc/>}
        </div>
        <p className="text-center text-xs text-gray-400 mt-6">
          Estimates only — not tax or legal advice. Consult a CPA for your situation.<br/>
          Tax brackets reflect 2025 IRS tables. © 2026 FreelancerFinanceTools.com
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
